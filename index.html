<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark light">
  <title>The Heritage Escape — MDP2 (FLP25B)</title>
  <style>
    :root {
      --bg: #0c160f;
      --bg-2: #0f1d13;
      --surface: #15271a;
      --surface-2: #1b3120;
      --ink: #eaf3ea;
      --muted: #9db8a4;
      --line: #27432e;
      --brand: #2e8b57;
      --brand-2: #56c98a;
      --accent: #e0a955;
      --accent-2: #f2c879;
      --gold-soft: #2a2114;
      --good: #56c98a;
      --bad: #e98080;
      --shadow: 0 10px 30px rgba(0, 0, 0, .45);
      --radius: 18px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%
    }

    body {
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(46, 139, 87, .18), transparent 60%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
    }

    .app {
      max-width: 520px;
      margin-inline: auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 14px 16px 26px
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px
    }

    .brandmark {
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--brand-2);
      font-weight: 800
    }

    .clock {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 13px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      color: var(--accent-2)
    }

    .clock .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand-2);
      animation: pulse 2s infinite
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(86, 201, 138, .5)
      }

      70% {
        box-shadow: 0 0 0 9px rgba(86, 201, 138, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(86, 201, 138, 0)
      }
    }

    .frags {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 4px 0 16px
    }

    .frag {
      flex: 1;
      height: 8px;
      border-radius: 6px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      transition: all .4s ease
    }

    .frag.done {
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      border-color: var(--brand-2);
      box-shadow: 0 0 12px rgba(86, 201, 138, .5)
    }

    .stage {
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      animation: rise .35s ease
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .kicker {
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 800;
      margin: 0 0 6px
    }

    .stage h1 {
      margin: 0 0 10px;
      font-size: 23px;
      line-height: 1.2
    }

    .story {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 14px
    }

    .story strong {
      color: var(--ink)
    }

    .story em {
      color: var(--accent-2);
      font-style: italic
    }

    .suggest {
      font-size: 11.5px;
      color: var(--muted);
      margin: -6px 0 12px
    }

    .suggest b {
      color: var(--accent-2)
    }

    .clues {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin: 0 0 14px
    }

    .clue {
      background: var(--bg);
      border: 1px solid var(--line);
      border-inline-start: 4px solid var(--accent);
      border-radius: 12px;
      padding: 11px 13px;
      animation: rise .3s ease
    }

    .clue .lbl {
      display: block;
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 4px
    }

    .clue .txt {
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink)
    }

    .clue.locked {
      border-inline-start-color: var(--line);
      opacity: .55;
      font-style: italic;
      color: var(--muted)
    }

    .cluebtn {
      appearance: none;
      background: none;
      border: 1px dashed var(--line);
      color: var(--accent-2);
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      align-self: flex-start;
      -webkit-tap-highlight-color: transparent
    }

    .cluebtn:active {
      background: var(--surface)
    }

    .cluebtn:disabled {
      opacity: .45;
      cursor: default;
      color: var(--muted)
    }

    .keys-legend {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 9px
    }

    .kl {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 6px 4px;
      text-align: center
    }

    .kl b {
      display: block;
      font-size: 16px;
      color: var(--accent-2);
      font-weight: 800
    }

    .kl span {
      font-size: 10px;
      letter-spacing: .12em;
      color: var(--muted)
    }

    .codebox {
      display: flex;
      justify-content: center;
      gap: 9px;
      margin: 6px 0 14px;
      flex-wrap: wrap
    }

    .cell {
      width: 42px;
      height: 54px;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      transition: all .15s ease
    }

    .cell.filled {
      border-color: var(--brand-2);
      background: var(--bg);
      box-shadow: inset 0 0 0 1px var(--brand)
    }

    .codebox.shake {
      animation: shake .4s
    }

    .codebox.good .cell {
      border-color: var(--good);
      box-shadow: 0 0 14px rgba(86, 201, 138, .5)
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      20% {
        transform: translateX(-8px)
      }

      40% {
        transform: translateX(8px)
      }

      60% {
        transform: translateX(-6px)
      }

      80% {
        transform: translateX(6px)
      }
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: auto
    }

    .key {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      border-radius: 14px;
      padding: 15px 0;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .08s ease, background .15s ease;
      -webkit-tap-highlight-color: transparent
    }

    .key:active {
      transform: scale(.94);
      background: var(--surface-2)
    }

    .key.fn {
      font-size: 15px;
      color: var(--accent-2)
    }

    .key.enter {
      background: linear-gradient(180deg, var(--brand), #23704a);
      border-color: var(--brand-2);
      color: #fff;
      font-size: 16px
    }

    .key.enter:active {
      filter: brightness(1.08)
    }

    .textentry {
      display: flex;
      gap: 9px;
      margin-top: auto
    }

    .tinput {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--ink);
      font-size: 19px;
      font-weight: 700;
      padding: 14px 14px;
      letter-spacing: .04em;
      text-align: center;
      outline: none
    }

    .tinput:focus {
      border-color: var(--brand-2);
      box-shadow: inset 0 0 0 1px var(--brand)
    }

    .tinput.shake {
      animation: shake .4s
    }

    .textentry .enter {
      flex: 0 0 auto;
      padding-inline: 20px
    }

    .jig-wrap {
      margin-top: 6px
    }

    .pgrid {
      position: relative;
      width: 100%;
      aspect-ratio: 3/2;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 4px;
      background: var(--line);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 4px;
      touch-action: none;
      user-select: none
    }

    .ptile {
      border-radius: 9px;
      background-size: 300% 200%;
      background-repeat: no-repeat;
      cursor: grab;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .25);
      transition: box-shadow .12s ease;
      position: relative
    }

    .ptile:active {
      cursor: grabbing
    }

    .ptile.drag {
      box-shadow: 0 8px 22px rgba(0, 0, 0, .5), 0 0 0 2px var(--accent-2);
      opacity: .95
    }

    .ptile.sel {
      box-shadow: 0 0 0 3px var(--accent-2)
    }

    .ptile .num {
      position: absolute;
      top: 4px;
      inset-inline-start: 6px;
      font-size: 11px;
      font-weight: 800;
      color: rgba(255, 255, 255, .6)
    }

    .jig-cap {
      font-size: 12.5px;
      color: var(--muted);
      text-align: center;
      margin-top: 10px
    }

    .feedback {
      min-height: 22px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      margin: 12px 0 2px
    }

    .feedback.bad {
      color: var(--bad)
    }

    .feedback.good {
      color: var(--good)
    }

    .reveal {
      text-align: center;
      padding: 6px 2px
    }

    .reveal .crest {
      font-size: 48px;
      margin: 4px 0 2px
    }

    .reveal h1 {
      font-size: 25px;
      margin: 6px 0 4px
    }

    .reveal .hero-img {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin: 14px 0
    }

    .reveal .hero-img img {
      display: block;
      width: 100%
    }

    .streets {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 16px 0
    }

    .street {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 15px;
      text-align: start
    }

    .street .nm {
      font-weight: 800;
      color: var(--brand-2);
      font-size: 16px
    }

    .street .ds {
      color: var(--muted);
      font-size: 13.5px;
      margin-top: 3px
    }

    .letter {
      background: var(--gold-soft);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 15px;
      margin: 14px 0;
      font-style: italic;
      color: var(--accent-2);
      line-height: 1.6;
      font-size: 15px
    }

    .stamp {
      display: inline-block;
      border: 2px solid var(--accent);
      color: var(--accent-2);
      border-radius: 10px;
      padding: 8px 16px;
      font-weight: 800;
      letter-spacing: .08em;
      transform: rotate(-3deg);
      margin-top: 8px
    }

    .scoreline {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 18px 0 6px
    }

    .score {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 16px;
      min-width: 90px
    }

    .score .v {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent-2);
      font-variant-numeric: tabular-nums
    }

    .score .l {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px
    }

    .foot {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11.5px;
      color: var(--muted)
    }

    .resetbtn {
      appearance: none;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11.5px;
      text-decoration: underline;
      cursor: pointer
    }
  </style>
</head>

  <div class="kl"><b>4</b><span>GHI</span></div><div class="kl"><b>5</b><span>JKL</span></div><div class="kl"><b>6</b><span>MNO</span></div>
  <div class="kl"><b>7</b><span>PQRS</span></div><div class="kl"><b>8</b><span>TUV</span></div><div class="kl"><b>9</b><span>WXYZ</span></div>
  <div class="kl"><b>*</b><span>&nbsp;</span></div><div class="kl"><b>0</b><span>+</span></div><div class="kl"><b>#</b><span>&nbsp;</span></div>
</div>`;

    /* The chain: Lock 1 -> 2 -> 3 -> final. (No Lock 4 supplied yet.) */
    const STAGES = [
      {
        type: "text", answer: "TAN AH MIE", suggested: "5–10 min", autoEvery: 90,
        kicker: "Lock 1 · The Roots",
        title: "Who believed first?",
        story: "Before the company, before the first mill.",
        clues: ["The Roots.",
          "The ones who believed in Chairman before anyone else.",
          "<em>Akong</em>"]
      },
      {
        type: "numeric", len: 4, answer: "1967", jigsaw: true, suggested: "5 min", autoEvery: 90,
        kicker: "Lock 2 · When",
        clues: ["Nothing.",
          "Spare parts &amp; contractor.",
          "<em>Survival. Started early. One man.</em>"],
        jigCaption: "Drag a tile onto another to swap — or tap one, then tap another."
      },
      {
        type: "numeric", len: 6, answer: "867422", suggested: "5 min", autoEvery: 90,
        kicker: "Lock 4 · Identity",
        clues: ["Our Values.",
          KEYPAD_LEGEND,
          "<em>T = 8.</em>"],
        bridge: "Unlocked. Now head back to the <strong>RGE Auditorium Lifelong Learning Center</strong> — the last lock is waiting there."
      },
      {
        type: "text", answer: "FLP25B", final: true, suggested: "5 min", autoEvery: 90,
        kicker: "Lock 5 · ???",
        clues: ["Lifelong Learning.",
          "Partnered with NTU.",
          "<em>YOU!</em>"]
      }
    ];

    function heritageSrc() {
      if (CONFIG.heritageImage) return CONFIG.heritageImage;
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='600' height='400'>
    <rect width='600' height='400' fill='#15271a'/>
    <rect y='292' width='600' height='108' fill='#1b3120'/>
    <circle cx='505' cy='78' r='40' fill='#e0a955'/>
    <rect x='34' y='118' width='196' height='58' rx='8' fill='#2e8b57'/>
    <text x='132' y='155' font-size='22' fill='#ffffff' text-anchor='middle' font-family='Segoe UI,Arial' font-weight='bold'>JL. CIREBON</text>
    <rect x='352' y='176' width='214' height='58' rx='8' fill='#56c98a'/>
    <text x='459' y='213' font-size='22' fill='#10160f' text-anchor='middle' font-family='Segoe UI,Arial' font-weight='bold'>JL. SURABAYA</text>
    <text x='300' y='280' font-size='66' fill='#f2c879' text-anchor='middle' font-family='Segoe UI,Arial' font-weight='bold'>1967</text>
    <text x='300' y='352' font-size='17' fill='#9db8a4' text-anchor='middle' font-family='Segoe UI,Arial'>Where it began · drop your real photo in CONFIG</text>
  </svg>`;
      return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
    }
    function cohortSrc() {
      if (CONFIG.cohortImage) return CONFIG.cohortImage;
      const heads = [80, 160, 240, 320, 400, 480].map((x, i) =>
        `<circle cx='${x}' cy='${150 + (i % 2 ? 14 : 0)}' r='34' fill='#2e8b57'/><rect x='${x - 34}' y='196' width='68' height='86' rx='30' fill='#1b3120'/>`).join('');
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='600' height='360'>
    <rect width='600' height='360' fill='#15271a'/>${heads}
    <text x='300' y='66' font-size='40' fill='#f2c879' text-anchor='middle' font-family='Segoe UI,Arial' font-weight='bold'>FLP25B</text>
    <text x='300' y='332' font-size='16' fill='#9db8a4' text-anchor='middle' font-family='Segoe UI,Arial'>Your cohort · drop the group photo in CONFIG</text>
  </svg>`;
      return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
    }

    const KEY = "mdp2esc_v2";
    let state = load() || { stage: 0, startTs: Date.now(), clues: [1, 1, 1, 1], extraClues: 0, done: false, finishTs: null };
    if (!state.clues) state.clues = STAGES.map(() => 1);
    function load() { try { return JSON.parse(localStorage.getItem(KEY)); } catch (e) { return null; } }
    function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

    const clockEl = document.getElementById("clock");
    function fmt(ms) { const s = Math.max(0, Math.floor(ms / 1000)); return String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0"); }
    setInterval(() => { const end = state.done ? state.finishTs : Date.now(); clockEl.textContent = fmt(end - state.startTs); }, 1000);

    function buildFrags() { document.getElementById("frags").innerHTML = STAGES.map(() => `<span class="frag"></span>`).join(""); }
    function paintFrags() { document.querySelectorAll("#frags .frag").forEach((f, i) => { f.classList.toggle("done", i < state.stage || state.done); }); }

    const stageEl = document.getElementById("stage");
    let entry = "";
    let autoTimer = null;

    function render() {
      if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
      paintFrags(); save();
      if (state.done) return renderReveal();
      const s = STAGES[state.stage];
      if (s.type === "numeric") renderNumeric(s);
      else if (s.type === "text") renderText(s);
      startAutoClues(s);
    }

    function header(s) {
      return `<p class="kicker">${s.kicker}</p>`
        + (s.title ? `<h1>${s.title}</h1>` : "")
        + (s.story ? `<p class="story">${s.story}</p>` : "")
        + (s.suggested ? `<p class="suggest">Target: <b>${s.suggested}</b> · a new clue appears every 90 seconds — solve early to win the clock.</p>` : "");
    }

    function clueHTML(s) {
      const seen = state.clues[state.stage] || 1;
      let rows = s.clues.map((c, i) => {
        if (i < seen) return `<div class="clue"><span class="lbl">Clue ${i + 1}</span><div class="txt">${c}</div></div>`;
        return `<div class="clue locked"><span class="lbl">Clue ${i + 1}</span><div class="txt">Appears automatically…</div></div>`;
      }).join("");
      return `<div class="clues" id="clues">${rows}</div>`;
    }
    function wireClue(s) {
      const b = document.getElementById("cluebtn"); if (!b) return;
      b.addEventListener("click", () => { revealNextClue(s); });
    }
    function revealNextClue(s) {
      const seen = state.clues[state.stage] || 1;
      if (seen >= s.clues.length) return;
      state.clues[state.stage] = seen + 1;
      state.extraClues++;
      save();
      const cont = document.getElementById("clues");
      if (cont) { cont.outerHTML = clueHTML(s); wireClue(s); }
    }
    function startAutoClues(s) {
      if (!s.autoEvery) return;
      autoTimer = setInterval(() => {
        if (state.done) { clearInterval(autoTimer); autoTimer = null; return; }
        const seen = state.clues[state.stage] || 1;
        if (seen >= s.clues.length) { clearInterval(autoTimer); autoTimer = null; return; }
        revealNextClue(s);
      }, s.autoEvery * 1000);
    }

    function renderNumeric(s) {
      entry = "";
      stageEl.innerHTML = header(s) + clueHTML(s)
        + `<div class="codebox" id="code">${Array.from({ length: s.len }).map(() => `<div class="cell"></div>`).join("")}</div>`
        + `<div class="feedback" id="fb"></div>`
        + `<div class="keypad" id="pad">
        ${[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => `<button class="key" data-k="${n}">${n}</button>`).join("")}
        <button class="key fn" data-k="clear">Clear</button>
        <button class="key" data-k="0">0</button>
        <button class="key enter" data-k="enter">Enter</button>
      </div>`;
      paintCode(s); wireClue(s);
      document.getElementById("pad").addEventListener("click", e => {
        const b = e.target.closest("button"); if (!b) return; const k = b.dataset.k;
        if (k === "clear") { entry = ""; paintCode(s); clearFb(); }
        else if (k === "enter") { checkNumeric(s); }
        else if (entry.length < s.len) { entry += k; paintCode(s); if (entry.length === s.len) checkNumeric(s); }
      });
    }
    function paintCode(s) {
      document.querySelectorAll("#code .cell").forEach((c, i) => { c.textContent = entry[i] || ""; c.classList.toggle("filled", !!entry[i]); });
    }
    function checkNumeric(s) {
      const box = document.getElementById("code");
      if (entry === String(s.answer)) { box.classList.add("good"); onSolved(s); }
      else {
        box.classList.add("shake"); setFb("Not quite — check the clues again.", "bad");
        setTimeout(() => { box.classList.remove("shake"); entry = ""; paintCode(s); }, 500);
      }
    }

    function norm(x) { return String(x).toUpperCase().replace(/[^A-Z0-9]/g, ""); }
    function renderText(s) {
      stageEl.innerHTML = header(s) + clueHTML(s)
        + `<div class="feedback" id="fb"></div>`
        + `<div class="textentry">
         <input id="tin" class="tinput" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="Type your answer">
         <button class="key enter" id="tsub" type="button">Enter</button>
       </div>`;
      wireClue(s);
      const inp = document.getElementById("tin");
      function go() {
        if (norm(inp.value) === norm(s.answer)) onSolved(s);
        else {
          setFb("Not the name — read the next clue.", "bad");
          inp.classList.add("shake"); setTimeout(() => inp.classList.remove("shake"), 500);
        }
      }
      document.getElementById("tsub").addEventListener("click", go);
      inp.addEventListener("keydown", e => { if (e.key === "Enter") go(); });
      setTimeout(() => { try { inp.focus(); } catch (_) { } }, 60);
    }

    function onSolved(s) {
      if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
      if (s.jigsaw) { return renderJigsaw(s); }
      setFb("Unlocked.", "good");
      setTimeout(() => advance(s), 700);
    }
    function advance(s) {
      state.stage++;
      if (state.stage >= STAGES.length) { state.done = true; state.finishTs = Date.now(); }
      save();
      if (state.done) return render();
      if (s && s.bridge) {
        paintFrags();
        stageEl.innerHTML = `<div class="reveal"><div class="crest">&#128275;</div>
      <h1>Unlocked</h1><p class="story" style="text-align:center">${s.bridge}</p>
      <button class="key enter" id="cont" type="button" style="margin-top:10px">Next lock</button></div>`;
        document.getElementById("cont").addEventListener("click", render);
      } else render();
    }

    let order = [], selected = null, dragEl = null, dragSlot = -1, sx = 0, sy = 0;
    function renderJigsaw(s) {
      order = [0, 1, 2, 3, 4, 5];
      do { for (let i = order.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = order[i]; order[i] = order[j]; order[j] = t; } }
      while (order.every((v, i) => v === i));
      selected = null;
      const img = heritageSrc();
      stageEl.innerHTML = `<p class="kicker">Lock 3 · Rebuild</p>
    <div class="jig-wrap"><div class="pgrid" id="pgrid">
      ${order.map((_, slot) => `<div class="ptile" data-slot="${slot}" style="background-image:url('${img}')"></div>`).join("")}
    </div><div class="jig-cap">${s.jigCaption || ""}</div></div>
    <div class="feedback" id="fb"></div>`;
      paintTiles();
      const grid = document.getElementById("pgrid");
      grid.addEventListener("pointerdown", onPDown);
      grid.addEventListener("pointermove", onPMove);
      grid.addEventListener("pointerup", onPUp);
      grid.addEventListener("pointercancel", onPUp);
    }
    function tileBgPos(cell) { const col = cell % 3, row = Math.floor(cell / 3); return (col * 50) + "% " + (row * 100) + "%"; }
    function paintTiles() {
      document.querySelectorAll("#pgrid .ptile").forEach(t => { t.style.backgroundPosition = tileBgPos(order[+t.dataset.slot]); });
    }
    function onPDown(e) {
      const t = e.target.closest(".ptile"); if (!t) return;
      dragEl = t; dragSlot = +t.dataset.slot; sx = e.clientX; sy = e.clientY;
      try { t.setPointerCapture(e.pointerId); } catch (_) { }
      t.classList.add("drag");
    }
    function onPMove(e) {
      if (!dragEl) return;
      dragEl.style.transform = `translate(${e.clientX - sx}px,${e.clientY - sy}px) scale(1.05)`;
      dragEl.style.zIndex = 50;
    }
    function onPUp(e) {
      if (!dragEl) return;
      const moved = Math.hypot(e.clientX - sx, e.clientY - sy) > 10;
      const el = dragEl; el.style.transform = ""; el.style.zIndex = ""; el.classList.remove("drag");
      if (moved) {
        el.style.pointerEvents = "none";
        const tgt = document.elementFromPoint(e.clientX, e.clientY);
        el.style.pointerEvents = "";
        const tt = tgt && tgt.closest && tgt.closest(".ptile");
        if (tt) { const ts = +tt.dataset.slot; if (ts !== dragSlot) swapTiles(dragSlot, ts); }
      } else {
        if (selected === null) { selected = dragSlot; el.classList.add("sel"); }
        else if (selected === dragSlot) { selected = null; el.classList.remove("sel"); }
        else { swapTiles(selected, dragSlot); }
      }
      dragEl = null; dragSlot = -1;
    }
    function swapTiles(a, b) {
      const t = order[a]; order[a] = order[b]; order[b] = t;
      document.querySelectorAll("#pgrid .ptile.sel").forEach(x => x.classList.remove("sel")); selected = null;
      paintTiles();
      if (order.every((v, i) => v === i)) jigsawDone();
    }
    function jigsawDone() {
      const s = STAGES[state.stage]; const img = heritageSrc();
      stageEl.innerHTML = `<div class="reveal"><div class="crest">&#127881;</div>
    <h1>Rebuilt — with your own hands.</h1>
    <div class="hero-img"><img src="${img}" alt="The founding streets"></div>
    <div class="streets">
      <div class="street"><div class="nm">Jl. Cirebon</div><div class="ds">Chairman's first office — where it all began, 1967.</div></div>
      <div class="street"><div class="nm">Jl. Surabaya</div><div class="ds">Where it grew.</div></div>
    </div>
    <button class="key enter" id="cont" type="button">Next lock</button></div>`;
      document.getElementById("cont").addEventListener("click", () => advance(s));
    }

    function setFb(msg, kind) { const fb = document.getElementById("fb"); if (!fb) return; fb.textContent = msg; fb.className = "feedback " + (kind || ""); }
    function clearFb() { const fb = document.getElementById("fb"); if (fb) { fb.textContent = ""; fb.className = "feedback"; } }

    function renderReveal() {
      if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
      paintFrags();
      const total = (state.finishTs || Date.now()) - state.startTs;
      const adj = total + state.extraClues * CONFIG.cluePenaltySeconds * 1000;
      document.getElementById("footinfo").textContent = "Report your adjusted time to the host for the leaderboard.";
      stageEl.innerHTML = `<div class="reveal">
    <div class="crest">&#127881;</div>
    <h1>FLP25B — that's you.</h1>
    <p class="story" style="text-align:center">The story was never only about 1967. It's the people who just lived the week.</p>
    <div class="hero-img"><img src="${cohortSrc()}" alt="FLP25B cohort"></div>
    <div class="letter">"From nothing, in 1967, one man started early and survived. You've traced trail of his journey, his values. This program is his trust in lifelong learning, his belief in YOU!"</div>
    <div class="scoreline">
      <div class="score"><div class="v">${fmt(total)}</div><div class="l">Raw time</div></div>
      <div class="score"><div class="v">${state.extraClues}</div><div class="l">Extra clues</div></div>
      <div class="score"><div class="v">${fmt(adj)}</div><div class="l">Adjusted</div></div>
    </div>
    <div class="stamp">MEDAN · 1967 &rarr; 2026</div>
  </div>`;
    }

    document.getElementById("reset").addEventListener("click", () => {
      if (confirm("Start fresh for a new team? This clears progress on this device.")) {
        localStorage.removeItem(KEY);
        state = { stage: 0, startTs: Date.now(), clues: STAGES.map(() => 1), extraClues: 0, done: false, finishTs: null };
        save(); buildFrags(); render();
      }
    });

    buildFrags();
    render();
  </script>
</body>

</html>
